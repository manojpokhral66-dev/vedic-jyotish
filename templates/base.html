<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🕉️ Vedic Jyotish - Strong Indian Astrology</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #fffaf0, #f0e6d2); font-family: 'Georgia', serif; }
        .card { border: 4px solid #8B4513; }
        .rasi { display: grid; grid-template-columns: repeat(4, 1fr); width: 420px; height: 420px; border: 6px solid #8B4513; background: white; margin: 20px auto; }
        .rasi div { border: 2px solid #8B4513; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; position: relative; }
        .center { grid-column: 2 / 4; grid-row: 2 / 4; font-size: 24px !important; background: #fffaf0; }
    </style>
</head>
<body class="container py-4">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <a class="navbar-brand" href="/">🕉️ Vedic Jyotish</a>
        <a class="nav-link text-light" href="/ephemeris">Lahiri Ephemeris</a>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
