{% extends "base.html" %}
{% block content %}
<h1 class="text-center mb-4">Generate Your Vedic Kundli</h1>
<div class="card p-4">
    <form method="POST">
        <div class="row g-3">
            <div class="col-md-6"><input type="text" name="name" class="form-control" placeholder="Your Name" value="Monoj" required></div>
            <div class="col-md-6"><input type="date" name="date" class="form-control" value="1995-03-15" required></div>
            <div class="col-md-4"><input type="time" name="time" class="form-control" value="14:30" required></div>
            <div class="col-md-4"><input type="number" step="0.0001" name="lat" class="form-control" value="26.18" placeholder="Latitude (Guwahati)" required></div>
            <div class="col-md-4"><input type="number" step="0.0001" name="lon" class="form-control" value="91.74" placeholder="Longitude" required></div>
            <button type="submit" class="btn btn-success btn-lg w-100">Generate Kundli & Real-time Dasha</button>
        </div>
    </form>
</div>
<p class="text-center mt-3 text-muted">Lahiri Ayanamsa • Accurate as Jagannatha Hora</p>
{% endblock %}
